name: Release

# On push to main this workflow has two modes:
#
#   1. There are pending changesets in `.changeset/`: open or update a
#      "Version Packages" PR that bumps versions + changelogs.
#   2. The Version Packages PR has just been merged: publish every
#      non-private workspace package whose version is not yet on npm.
#
# Mode 2 runs through `scripts/safe-publish.mjs` rather than the default
# `changesets publish`. That wrapper:
#   - skips packages whose current version is already on the registry
#     (matches the behaviour of `changesets publish` for unchanged packages),
#   - auto-bumps past tombstoned versions until a free slot is found, and
#     commits those bumps back to main so the next release does not have
#     to walk them again,
#   - emits the `🦋  New tag: ...` markers `changesets/action` greps for so
#     GitHub releases continue to be created automatically.
#
# Required repo secret:
#   - NPM_TOKEN: npm automation token with publish rights for the @moxxy scope.
# GITHUB_TOKEN is provided automatically.
on:
  push:
    branches: [main]

# Serialise releases. We do not cancel in flight because cancelling a
# publish midway can leave one package on the registry and another not.
concurrency: release

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version / publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The safe-publish script may commit follow-up version bumps when
          # it walks past tombstoned npm slots. Fetch enough history that
          # the resulting `git push` is a fast-forward.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build so the prepack/postpack flow (strip @moxxy/* devDeps, bundle)
      # runs against a fresh dist before publish.
      - name: Build
        run: pnpm build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm dlx @changesets/cli@2.27.10 version
          publish: node scripts/safe-publish.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
